<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login 💖</title>

<style>
/* 🌸 Background with anime image */
body {
    margin: 0;
    height: 100vh;
    font-family: 'Poppins', sans-serif;

    background: url("https://wallpapercave.com/wp/wp5128415.jpg") no-repeat center center/cover;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* 🌸 Dark overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
}

/* 🌸 Glass card */
.container {
    position: relative;
    z-index: 2;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    padding: 40px;
    border-radius: 25px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

/* 🌸 Title */
h2 {
    color: white;
    margin-bottom: 20px;
}

/* 🌸 Inputs */
.input-box {
    position: relative;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 20px;
    border: none;
    outline: none;
}

/* 👁️ Password toggle */
.eye {
    position: absolute;
    right: 15px;
    top: 18px;
    cursor: pointer;
}

/* 🌸 Button */
button {
    width: 100%;
    padding: 10px;
    background: #ff66b2;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

button:hover {
    background: #ff4da6;
}

/* 🌸 Link */
a {
    display: block;
    margin-top: 15px;
    color: #fff;
    text-decoration: none;
}

/* 🌸 Glow animation */
.container:hover {
    box-shadow: 0 0 40px rgba(255,105,180,0.8);
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
    <h2>💖 Welcome Back</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>

        <div class="input-box">
            <input id="password" name="password" type="password" placeholder="Password" required>
            <span class="eye" onclick="togglePassword()">👁️</span>
        </div>

        <button>Login ✨</button>
    </form>

    <a href="/register">Create account 💕</a>
</div>

<script>
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
